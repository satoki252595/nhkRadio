name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Copy data files to static/
        run: |
          mkdir -p static/data
          cp -f ../data/series.json static/data/ 2>/dev/null || true
          cp -f ../data/programs-latest.json static/data/ 2>/dev/null || true
          cp -f ../data/programs-*.json static/data/ 2>/dev/null || true

      - name: Build
        env:
          BASE_PATH: ${{ github.event.repository.name == github.event.repository.owner.login && '' || format('/{0}', github.event.repository.name) }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
