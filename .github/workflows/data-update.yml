name: Update Programs Data

on:
  schedule:
    # 毎日 19:30 UTC (JST 04:30) に実行
    - cron: '30 19 * * *'
  workflow_dispatch:

permissions:
  contents: write  # data/*.json を自動コミット

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install httpx pyyaml

      - name: Generate data files
        # 過去7日+未来7日を取得してシリーズカバレッジを最大化
        run: python -m nhk_recorder.data_export --days 7 --past-days 7 --output-dir ./data
        env:
          NHK_API_KEY: ${{ secrets.NHK_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update programs data [skip ci]"
          git push
