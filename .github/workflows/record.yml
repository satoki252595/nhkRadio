name: NHK Radio Recorder

on:
  schedule:
    # 毎時0分に実行 (UTC 0-14 = JST 9-23時)
    - cron: '0 0-14 * * *'
  workflow_dispatch:  # 手動実行
    inputs:
      mode:
        description: '録音モード'
        type: choice
        default: 'subscriptions'
        options:
          - subscriptions
          - keywords
      include_radiko:
        description: 'Radiko (民放) も対象にする (VPN接続を使用)'
        type: boolean
        default: true

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 最大2時間（60分番組+アップロード余裕）
    strategy:
      fail-fast: false
      # エリアごとに並列ジョブ: 関東(JP13)→TBS等、関西(JP27)→MBS等
      # NHKは両方のジョブで録音されうるが、Notion側で重複排除されない点注意
      # → 関西ジョブのみで --include-radiko を使い、関東は民放のみ録音する設計
      matrix:
        include:
          - region: kansai
            radiko_areas: JP27
            skip_nhk: false
          - region: kanto
            radiko_areas: JP13
            skip_nhk: true  # NHKは関西ジョブで録音済み

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg and openvpn
        run: sudo apt-get update && sudo apt-get install -y ffmpeg openvpn

      - name: Install Python dependencies
        run: pip install httpx pyyaml

      # VPN Gate 経由で指定リージョンのIPに切り替え
      - name: Fetch VPN Gate server (${{ matrix.region }})
        run: python -m nhk_recorder.vpngate vpn.ovpn --region ${{ matrix.region }}

      - name: Connect to VPN Gate
        uses: kota65535/github-openvpn-connect-action@v3
        with:
          config_file: vpn.ovpn
        continue-on-error: true  # VPN失敗時もスキップで続行

      - name: Verify IP location
        run: |
          echo "現在のIP:"
          curl -s https://ipinfo.io/json || true
        continue-on-error: true

      - name: Record (subscription mode)
        if: github.event_name == 'schedule' || inputs.mode == 'subscriptions'
        run: |
          if [ -f "data/subscriptions.json" ]; then
            python -m nhk_recorder --subscriptions data/subscriptions.json --within 65 --include-radiko \
              ${{ matrix.skip_nhk && '--skip-nhk' || '' }}
          else
            echo "data/subscriptions.json が存在しません。"
          fi
        env:
          NHK_API_KEY: ${{ secrets.NHK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Record (keyword mode)
        if: inputs.mode == 'keywords'
        run: |
          python -m nhk_recorder --within 65 --include-radiko \
            ${{ matrix.skip_nhk && '--skip-nhk' || '' }}
        env:
          NHK_API_KEY: ${{ secrets.NHK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
