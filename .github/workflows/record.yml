name: NHK Radio Recorder (Timefree)

# アーキテクチャ v2: Radiko タイムフリー API からの日次バッチダウンロード。
# live 録音の複雑性 (cron drop/lag, VPN area randomness, TOCTOU race,
# PRE_ROLL/POST_ROLL, broadcast day 境界) を一切扱わないシンプル設計。

on:
  schedule:
    # JST 06:00 (= UTC 21:00) に前日の放送分をまとめて取得。
    # GitHub Actions cron は 13-46 分遅延する可能性があるが、timefree は
    # 放送後 7 日間有効なので 1 時間程度ズレても全く問題ない。
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象放送日 (YYYY-MM-DD、デフォルト: 昨日)'
        type: string
        required: false
      days:
        description: '過去何日分を対象にするか'
        type: string
        default: '1'

jobs:
  download:
    runs-on: ubuntu-latest
    # live 録音 (240 分) と違い、timefree は 10-30 分で完了する。
    # 念のため 90 分確保 (大量購読・大きい番組に対応)。
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg and openvpn
        run: sudo apt-get update && sudo apt-get install -y ffmpeg openvpn

      - name: Install Python dependencies
        run: pip install httpx pyyaml

      # Radiko タイムフリーは JP IP が必要。area は問わず、どこでも OK。
      - name: Fetch VPN Gate server (any JP)
        run: python -m nhk_recorder.vpngate vpn.ovpn

      - name: Connect to VPN Gate
        uses: kota65535/github-openvpn-connect-action@v3
        with:
          config_file: vpn.ovpn

      - name: Verify IP location
        run: curl -s https://ipinfo.io/json || true
        continue-on-error: true

      - name: Download timefree recordings
        run: |
          ARGS="--subscriptions data/subscriptions.json --days ${{ inputs.days || '1' }}"
          if [ -n "${{ inputs.target_date }}" ]; then
            ARGS="$ARGS --target-date ${{ inputs.target_date }}"
          fi
          python -m nhk_recorder $ARGS
        env:
          NHK_API_KEY: ${{ secrets.NHK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
