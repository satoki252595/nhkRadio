name: NHK Radio Recorder (Timefree)

# v2 アーキテクチャ: Radiko タイムフリー API からの日次バッチダウンロード。
# VPN は Python 側で管理 (vpn_manager.py) し、複数の Radiko area を
# 順次カバーする multi-pass 方式で area 固定局の取得率を高める。

on:
  schedule:
    # JST 06:00 (= UTC 21:00) に前日の放送分をまとめて取得。
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象放送日 (YYYY-MM-DD、デフォルト: 昨日)'
        type: string
        required: false
      days:
        description: '過去何日分を対象にするか'
        type: string
        default: '1'
      max_vpn_attempts:
        description: '最大 VPN 試行回数 (area カバーのため複数回接続試行)'
        type: string
        default: '15'

jobs:
  download:
    runs-on: ubuntu-latest
    # 最長 2h 番組 + 複数 VPN 張り直し + setup + upload
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg and openvpn
        run: sudo apt-get update && sudo apt-get install -y ffmpeg openvpn

      - name: Install Python dependencies
        run: pip install httpx pyyaml

      - name: Verify sudo without password
        run: sudo -n true

      - name: Download timefree recordings (multi-VPN-pass)
        run: |
          ARGS="--subscriptions data/subscriptions.json --days ${{ inputs.days || '1' }}"
          ARGS="$ARGS --max-vpn-attempts ${{ inputs.max_vpn_attempts || '10' }}"
          if [ -n "${{ inputs.target_date }}" ]; then
            ARGS="$ARGS --target-date ${{ inputs.target_date }}"
          fi
          python -m nhk_recorder $ARGS
        env:
          NHK_API_KEY: ${{ secrets.NHK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Cleanup VPN on job end
        if: always()
        run: sudo pkill -TERM openvpn 2>/dev/null || true
